apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "greeter.fullname" . }}
  labels: {{- include "greeter.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "greeter.name" . }}
  template:
    metadata:
      labels: {{- include "greeter.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "greeter.fullname" . }}
      # Distroless/nonroot baseline: UID 65532 matches the image's nonroot user.
      # readOnlyRootFilesystem + drop-ALL caps + no privilege escalation = PSS "restricted".
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      # Soft zone spread: prefer one replica per AZ on EKS, but allow scheduling
      # in single-zone clusters (e.g. local k3d) without leaving pods Pending.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "greeter.name" . }}
      # Soft host anti-affinity: prefer different nodes for replicas to survive
      # single-node failures. preferredDuringScheduling -> not blocking on tiny clusters.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: {{ include "greeter.name" . }}
      containers:
        - name: greeter
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: HELLO_TAG
              value: {{ .Values.helloTag | quote }}
            - name: BUILD_TIME
              value: {{ .Values.buildTime | quote }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          resources: {{- toYaml .Values.resources | nindent 12 }}
