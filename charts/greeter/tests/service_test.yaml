suite: service
templates:
  - service.yaml
tests:
  - it: creates a ClusterIP service
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP
  - it: targets port 8080
    asserts:
      - contains:
          path: spec.ports
          content:
            name: http
            port: 8080
            targetPort: http
            protocol: TCP
  - it: becomes LoadBalancer with NLB annotation when values-dev.yaml is applied
    values:
      - ../values-dev.yaml
    asserts:
      - equal:
          path: spec.type
          value: LoadBalancer
      - equal:
          path: metadata.annotations["service.beta.kubernetes.io/aws-load-balancer-type"]
          value: nlb
