# Action versions pinned to commit SHAs for supply-chain integrity.
# Update via: curl -sL "https://api.github.com/repos/<owner>/<repo>/git/ref/tags/<version>" | jq -r .object.sha
name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: DeterminateSystems/nix-installer-action@da36cb69b1c3247ad7a1f931ebfd954a1105ef14 # v14
      - uses: DeterminateSystems/magic-nix-cache-action@87b14cf437d03d37989d87f0fa5ce4f5dc1a330b # v8
      - run: nix develop --command just fmt-check
      - run: nix develop --command just lint
      - run: nix develop --command just validate
      - run: nix develop --command just tflint
      - run: nix develop --command just security
      - run: nix develop --command just test
      - run: nix develop --command just test-ci-workflow
  build-and-push:
    needs: check
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: write
    env:
      AWS_REGION: eu-central-1
      ECR_REPOSITORY_URL: ${{ vars.ECR_REPOSITORY_URL }}
      ECR_REGISTRY_HOST: ${{ vars.ECR_REGISTRY_HOST }}
      CI_APP_ROLE_ARN: ${{ vars.CI_APP_ROLE_ARN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: DeterminateSystems/nix-installer-action@da36cb69b1c3247ad7a1f931ebfd954a1105ef14 # v14
      - uses: DeterminateSystems/magic-nix-cache-action@87b14cf437d03d37989d87f0fa5ce4f5dc1a330b # v8
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          role-to-assume: ${{ env.CI_APP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Build image
        run: nix build .#dockerImage
      - name: Scan image (Trivy)
        run: |
          docker load < result
          nix develop --command trivy image \
            --exit-code 1 --severity HIGH,CRITICAL \
            greeter:latest
      - name: Push to ECR (idempotent)
        id: push
        run: |
          IMAGE_TAG="${{ github.sha }}"
          REPO_NAME="${ECR_REPOSITORY_URL##*/}"

          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "$ECR_REGISTRY_HOST"

          if aws ecr describe-images \
              --repository-name "$REPO_NAME" \
              --image-ids imageTag="$IMAGE_TAG" \
              --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "Image $IMAGE_TAG already exists in ECR — skipping push."
          else
            docker tag greeter:latest "$ECR_REPOSITORY_URL:$IMAGE_TAG"
            docker push "$ECR_REPOSITORY_URL:$IMAGE_TAG"
          fi

          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          {
            echo "IMAGE_TAG=$IMAGE_TAG"
            echo "BUILD_TIME=$BUILD_TIME"
            echo "SHORT_SHA=${IMAGE_TAG:0:7}"
          } >> "$GITHUB_ENV"
      - name: Update values-dev.yaml
        run: |
          nix develop --command yq -i \
            ".image.repository = \"$ECR_REPOSITORY_URL\" |
             .image.tag        = \"$IMAGE_TAG\"        |
             .helloTag         = \"$IMAGE_TAG\"        |
             .buildTime        = \"$BUILD_TIME\"" \
            charts/greeter/values-dev.yaml
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/greeter/values-dev.yaml
          if git diff --staged --quiet; then
            echo "No values-dev.yaml changes — nothing to commit."
          else
            git commit -m "chore: bump greeter to ${SHORT_SHA} [skip ci]"
            git push
          fi
  deploy-platform:
    needs: check
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: eu-central-1
      CI_INFRA_ROLE_ARN: ${{ vars.CI_INFRA_ROLE_ARN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: DeterminateSystems/nix-installer-action@da36cb69b1c3247ad7a1f931ebfd954a1105ef14 # v14
      - uses: DeterminateSystems/magic-nix-cache-action@87b14cf437d03d37989d87f0fa5ce4f5dc1a330b # v8
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          role-to-assume: ${{ env.CI_INFRA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Tofu init
        working-directory: envs/dev
        run: nix develop --command tofu init -input=false -no-color
      - name: Tofu apply (phase 1 — bootstrap + platform)
        working-directory: envs/dev
        run: |
          nix develop --command tofu apply \
            -target=module.bootstrap \
            -target=module.platform \
            -auto-approve -input=false -no-color
      - name: Print outputs
        working-directory: envs/dev
        run: nix develop --command tofu output
  deploy-gitops:
    needs: deploy-platform
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: eu-central-1
      CI_INFRA_ROLE_ARN: ${{ vars.CI_INFRA_ROLE_ARN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: DeterminateSystems/nix-installer-action@da36cb69b1c3247ad7a1f931ebfd954a1105ef14 # v14
      - uses: DeterminateSystems/magic-nix-cache-action@87b14cf437d03d37989d87f0fa5ce4f5dc1a330b # v8
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          role-to-assume: ${{ env.CI_INFRA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Tofu init
        working-directory: envs/dev
        run: nix develop --command tofu init -input=false -no-color
      - name: Tofu apply (phase 2 — full, deploys ArgoCD)
        working-directory: envs/dev
        run: nix develop --command tofu apply -auto-approve -input=false -no-color
      - name: Print outputs
        working-directory: envs/dev
        run: nix develop --command tofu output
